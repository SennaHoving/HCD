<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <nav>
        <a href="index.html">Terug</a>
        <h2>Group chat</h2>
    </nav>
    <div class="group-chat">
        <div>
            <div class="text-bubble">
                <div class="1"></div>
                <button class="1">Yo, zijn jullie al wakker?</button>
            </div>

            <div class="text-bubble">
                <div class="2"></div>
                <button class="2">Net pas haha. Wat is er?</button>
                <button class="2">Had echt geen zin om op te staan</button>
            </div>

            <div class="text-bubble">
                <div class="1"></div>
                <button class="1">Denken jullie dat het vandaag droog blijft?</button>
            </div>

            <div class="text-bubble">
                <div class="3"></div>
                <button class="3">Ik denk het wel, maar NL kennende…</button>
            </div>

            <div class="text-bubble">
                <div class="2"></div>
                <button class="2">Ik zie hier dat het pas vanavond gaat regenen</button>
                <button class="2">Waarom eigenlijk Sam? Had je plannen?</button>
                <button class="2">Ja, dacht misschien buiten lunchen?</button>
            </div>

            <div class="text-bubble">
                <div class="1"></div>
                <button class="1">Klinkt goed, ik ben erbij</button>
            </div>

            <div class="text-bubble">
                <div class="2"></div>
                <button class="2">Waar willen jullie heen?</button>
            </div>

            <div class="text-bubble">
                <div class="3"></div>
                <button class="3">Wat dacht je van dat nieuwe tentje bij het park?</button>
            </div>

            <div class="text-bubble">
                <div class="2"></div>
                <button class="2">Oja, goed idee! Zeg 13:00?</button>
            </div>

            <div class="text-bubble">
                <div class="1"></div>
                <button class="1">Perfect</button>
                <button class="1">Ik moet nog even douchen maar red het wel</button>
            </div>

            <div class="text-bubble">
                <div class="2"></div>
                <button class="2">Ik kom iets later, moet nog snel wat regelen</button>
                <button class="2">Waarschijnlijk kwartiertje ofzo</button>
            </div>

            <div class="text-bubble">
                <div class="3"></div>
                <button class="3">Geen stress, stuur maar als je er bent</button>
            </div>
        </div>
        <div>
            <input type="text">
            <div></div>
        </div>
    </div>

    <script src="scripts/chat.js"></script>
</body>
</html>
